services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: springer-api
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      # PostgreSQL для prod (переопределяет любое значение из .env)
      - DATABASE_URL=postgres://springer:springer@db:5432/springer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: springer-db
    environment:
      POSTGRES_USER: springer
      POSTGRES_PASSWORD: springer
      POSTGRES_DB: springer
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U springer -d springer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: selenium-chrome
    ports:
      - "4444:4444"
    shm_size: 2gb
    environment:
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

volumes:
  pg_data:
